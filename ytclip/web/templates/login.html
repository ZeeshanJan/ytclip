<!DOCTYPE html>
<html lang="en" data-theme="nord">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ytclip — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-7">
      <div style="display:inline-flex; align-items:center; gap:0.5rem; font-size:1.4rem; font-weight:700; letter-spacing:-0.03em; color: oklch(var(--bc)/1);">
        <i class="fa-solid fa-scissors" style="color: oklch(var(--p)/1); font-size:1.1rem;"></i>
        ytclip
      </div>
      <p style="margin-top:0.375rem; font-size:0.85rem; color: oklch(var(--bc)/0.4);">Enter your password to continue.</p>
    </div>

    <div class="card bg-base-100 shadow-md border border-base-300">
      <div class="card-body gap-4 p-6">
        {% if error %}
        <div class="alert alert-error py-2 text-sm gap-2">
          <i class="fa-solid fa-triangle-exclamation"></i>
          {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login" class="flex flex-col gap-3">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-medium text-base-content/50" for="password">Password</label>
            <input type="password" id="password" name="password"
                   autofocus autocomplete="current-password"
                   class="input input-bordered"
                   style="font-family: inherit;">
          </div>
          <button class="btn btn-primary mt-1 gap-2" type="submit" style="font-family: inherit;">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Sign in
          </button>
        </form>
      </div>
    </div>

  </div>
</body>
</html>
