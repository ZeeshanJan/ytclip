<div class="card-clean" style="overflow: hidden;">

  <!-- ── Player ──────────────────────────────────────────────────────── -->
  <div class="yt-player-wrapper">
    <iframe id="yt-iframe"
            src="https://www.youtube.com/embed/{{ video_id }}?enablejsapi=1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>
  </div>

  <!-- ── Clip controls ───────────────────────────────────────────────── -->
  <div class="controls-panel">

    <form hx-post="/clips"
          hx-target="#jobs-list"
          hx-swap="afterbegin"
          hx-indicator="#clip-spinner"
          hx-encoding="multipart/form-data"
          onsubmit="return _validateClip()">

      <input type="hidden" name="url" value="{{ url }}">

      <div class="flex flex-col gap-4">

        <!-- ── Timeline ──────────────────────────────────────────────── -->
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <span class="section-label">Timeline</span>
            <span id="slider-hint" class="text-xs" style="color: oklch(var(--bc) / 0.3); font-style: italic;">Loading…</span>
          </div>

          <div class="dual-range-wrapper">
            <div class="dual-range-track"></div>
            <div class="dual-range-fill" id="range-fill"></div>
            <input type="range" class="dual-range-input" id="start-slider" min="0" max="100" value="0"   step="0.1" disabled>
            <input type="range" class="dual-range-input" id="end-slider"   min="0" max="100" value="100" step="0.1" disabled>
          </div>

          <div class="slider-labels">
            <span id="slider-start-label">0:00</span>
            <span id="slider-end-label">—</span>
          </div>
        </div>

        <!-- ── Start / End inputs ──────────────────────────────────── -->
        <div class="time-inputs">

          <div class="time-field">
            <label>Start</label>
            <div class="time-input-row">
              <input id="start-display" name="start_time" type="text"
                     value="0:00" placeholder="0:00">
              <button type="button" class="time-set-btn yt-set-btn"
                      disabled title="Capture current playback position"
                      onclick="ytSetTime('start-display','start-slider')">
                <i class="fa-regular fa-clock"></i>
              </button>
            </div>
          </div>

          <div class="time-field">
            <label>End</label>
            <div class="time-input-row">
              <input id="end-display" name="end_time" type="text"
                     value="" placeholder="1:30">
              <button type="button" class="time-set-btn yt-set-btn"
                      disabled title="Capture current playback position"
                      onclick="ytSetTime('end-display','end-slider')">
                <i class="fa-regular fa-clock"></i>
              </button>
            </div>
          </div>

        </div>

        <!-- ── Error ──────────────────────────────────────────────── -->
        <p id="clip-error" class="clip-error">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="clip-error-msg"></span>
        </p>

        <!-- ── Format ─────────────────────────────────────────────── -->
        <div class="flex flex-col gap-2">
          <span class="section-label">Format</span>
          <div class="fmt-grid">
            <button type="button" class="fmt-btn{% if default_format=='mp4' %} active{% endif %}" data-fmt="mp4">
              <i class="fa-solid fa-film"></i>
              <span class="fmt-name">MP4</span>
              <span class="fmt-desc">H.264 · AAC</span>
            </button>
            <button type="button" class="fmt-btn{% if default_format=='mkv' %} active{% endif %}" data-fmt="mkv">
              <i class="fa-solid fa-box-archive"></i>
              <span class="fmt-name">MKV</span>
              <span class="fmt-desc">No re-encode</span>
            </button>
            <button type="button" class="fmt-btn{% if default_format=='mp3' %} active{% endif %}" data-fmt="mp3">
              <i class="fa-solid fa-music"></i>
              <span class="fmt-name">MP3</span>
              <span class="fmt-desc">Audio only</span>
            </button>
            <button type="button" class="fmt-btn{% if default_format=='aac' %} active{% endif %}" data-fmt="aac">
              <i class="fa-solid fa-headphones"></i>
              <span class="fmt-name">AAC</span>
              <span class="fmt-desc">Audio only</span>
            </button>
            <button type="button" class="fmt-btn{% if default_format=='gif' %} active{% endif %}" data-fmt="gif">
              <i class="fa-solid fa-rotate"></i>
              <span class="fmt-name">GIF</span>
              <span class="fmt-desc">Animated</span>
            </button>
            <button type="button" class="fmt-btn{% if default_format=='webp' %} active{% endif %}" data-fmt="webp">
              <i class="fa-solid fa-image"></i>
              <span class="fmt-name">WebP</span>
              <span class="fmt-desc">Animated</span>
            </button>
          </div>
          <input type="hidden" name="output_format" id="output-format-input" value="{{ default_format }}">
        </div>

        <!-- ── Subtitles ───────────────────────────────────────────── -->
        <label class="sub-toggle-row">
          <span class="section-label" style="margin:0">Subtitles</span>
          <input type="checkbox" name="include_subtitles" value="true"
                 id="subtitles-toggle"
                 class="toggle toggle-sm toggle-primary"
                 {% if include_subtitles %}checked{% endif %}>
        </label>

        <!-- ── Speed ──────────────────────────────────────────────── -->
        <div class="speed-row">
          <span class="section-label"><i class="fa-solid fa-gauge-high" style="font-size:.75rem"></i> Speed</span>
          <div class="speed-buttons">
            <button type="button" class="speed-btn" data-speed="0.25">0.25×</button>
            <button type="button" class="speed-btn" data-speed="0.5">0.5×</button>
            <button type="button" class="speed-btn active" data-speed="1">1×</button>
            <button type="button" class="speed-btn" data-speed="1.5">1.5×</button>
            <button type="button" class="speed-btn" data-speed="2">2×</button>
          </div>
          <input type="hidden" name="speed" id="speed-input" value="1">
        </div>

        <!-- ── Watermark ───────────────────────────────────────────── -->
        <label class="feat-toggle-row">
          <span class="feat-toggle-label">
            <i class="fa-solid fa-stamp feat-toggle-icon"></i> Watermark
          </span>
          <input type="checkbox" id="watermark-enabled-cb" class="toggle toggle-sm toggle-primary">
        </label>

        <div id="watermark-panel" class="watermark-panel">
          <input type="text" name="watermark_text" id="watermark-text-input"
                 class="wm-text-input" placeholder="@yourhandle or any text"
                 maxlength="80" disabled>

          <div class="wm-bottom-row">
            <div class="wm-field">
              <span class="section-label">Logo <span class="wm-note">PNG · not GIF</span></span>
              <label class="wm-file-label" id="wm-file-label">
                <i class="fa-solid fa-upload" style="font-size:.75rem;opacity:.6"></i>
                <span id="wm-file-name">Choose image…</span>
              </label>
              <input type="file" name="watermark_image" id="watermark-image-input"
                     accept="image/png,image/webp,image/jpeg" class="sr-only" disabled>
            </div>
            <div class="wm-field">
              <span class="section-label">Position</span>
              <div class="pos-grid-4">
                <button type="button" class="pos-btn" data-pos="tl" disabled>
                  <div class="pos-frame"><span class="pos-dot" style="top:3px;left:3px"></span></div>
                  <span>Top L</span>
                </button>
                <button type="button" class="pos-btn" data-pos="tr" disabled>
                  <div class="pos-frame"><span class="pos-dot" style="top:3px;right:3px"></span></div>
                  <span>Top R</span>
                </button>
                <button type="button" class="pos-btn" data-pos="bl" disabled>
                  <div class="pos-frame"><span class="pos-dot" style="bottom:3px;left:3px"></span></div>
                  <span>Bot L</span>
                </button>
                <button type="button" class="pos-btn active" data-pos="br" disabled>
                  <div class="pos-frame"><span class="pos-dot" style="bottom:3px;right:3px"></span></div>
                  <span>Bot R</span>
                </button>
              </div>
              <input type="hidden" name="watermark_position" id="watermark-pos-input" value="br">
            </div>
          </div>
        </div>

        <!-- ── Crop ───────────────────────────────────────────────── -->
        <label class="feat-toggle-row">
          <span class="feat-toggle-label">
            <i class="fa-solid fa-crop-simple feat-toggle-icon"></i> Crop frame
          </span>
          <input type="checkbox" id="crop-enabled-cb" class="toggle toggle-sm toggle-primary">
        </label>

        <div id="crop-panel" class="crop-panel">

          <div class="crop-presets">
            <button type="button" class="crop-preset-btn active" data-preset="9:16">9:16</button>
            <button type="button" class="crop-preset-btn" data-preset="1:1">1:1</button>
            <button type="button" class="crop-preset-btn" data-preset="4:5">4:5</button>
            <button type="button" class="crop-preset-btn" data-preset="16:9">16:9</button>
            <button type="button" class="crop-preset-btn" data-preset="custom">Custom</button>
          </div>

          <div class="crop-canvas-wrapper" id="crop-canvas-wrapper"
               style="aspect-ratio: {{ video_width or 16 }} / {{ video_height or 9 }}">
            <img class="crop-thumb" id="crop-thumb"
                 src="https://img.youtube.com/vi/{{ video_id }}/maxresdefault.jpg"
                 onerror="this.src='https://img.youtube.com/vi/{{ video_id }}/hqdefault.jpg'"
                 alt="Video thumbnail" draggable="false">
            <div class="crop-mask" id="cmask-t"></div>
            <div class="crop-mask" id="cmask-b"></div>
            <div class="crop-mask" id="cmask-l"></div>
            <div class="crop-mask" id="cmask-r"></div>
            <div class="crop-box" id="crop-box">
              <div class="crop-box-rule crop-box-rule-h" style="top:33.33%"></div>
              <div class="crop-box-rule crop-box-rule-h" style="top:66.66%"></div>
              <div class="crop-box-rule crop-box-rule-v" style="left:33.33%"></div>
              <div class="crop-box-rule crop-box-rule-v" style="left:66.66%"></div>
              <div class="crop-handle" data-handle="nw"></div>
              <div class="crop-handle" data-handle="ne"></div>
              <div class="crop-handle" data-handle="sw"></div>
              <div class="crop-handle" data-handle="se"></div>
            </div>
          </div>

          <div class="crop-info">
            <span class="crop-info-label"><i class="fa-solid fa-up-right-and-down-left-from-center fa-xs"></i> Output</span>
            <span class="crop-resolution" id="crop-resolution">—</span>
          </div>

          <input type="hidden" name="crop_x" id="crop-x-input" disabled>
          <input type="hidden" name="crop_y" id="crop-y-input" disabled>
          <input type="hidden" name="crop_w" id="crop-w-input" disabled>
          <input type="hidden" name="crop_h" id="crop-h-input" disabled>

        </div>

        <!-- ── Clip duration summary ──────────────────────────────── -->
        <div class="clip-summary">
          <span class="clip-summary-label">
            <i class="fa-regular fa-clock"></i> Clip duration
          </span>
          <span id="clip-duration-display" class="clip-summary-value">—</span>
        </div>

        <!-- ── Submit ─────────────────────────────────────────────── -->
        <button class="btn-create" type="submit">
          <span id="clip-spinner" class="htmx-indicator loading loading-spinner loading-xs"></span>
          <i class="fa-solid fa-scissors htmx-not-creating"></i>
          Create Clip
        </button>

      </div>
    </form>
  </div>

</div>

<style>
  .htmx-request .htmx-not-creating { display: none; }
</style>

<script>
(function () {
  var startSlider = document.getElementById('start-slider');
  var endSlider   = document.getElementById('end-slider');
  var startInput  = document.getElementById('start-display');
  var endInput    = document.getElementById('end-display');
  var startLabel  = document.getElementById('slider-start-label');
  var endLabel    = document.getElementById('slider-end-label');
  var hint        = document.getElementById('slider-hint');
  var durationEl  = document.getElementById('clip-duration-display');

  function _fmtTime(s) {
    s = Math.floor(Math.max(0, parseFloat(s) || 0));
    var h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    return m+':'+String(sec).padStart(2,'0');
  }

  function _parseTime(str) {
    str = (str||'').trim();
    var p = str.split(':');
    if (p.length===1) return parseFloat(p[0])||0;
    if (p.length===2) return parseInt(p[0])*60+parseFloat(p[1]);
    return parseInt(p[0])*3600+parseInt(p[1])*60+parseFloat(p[2]);
  }

  function _updateClipDuration() {
    if (!durationEl) return;
    var s = _parseTime(startInput.value);
    var e = _parseTime(endInput.value);
    var diff = e - s;
    durationEl.textContent = diff > 0 ? _fmtTime(diff) : '—';
  }

  function _initSlider(duration) {
    if (!duration || duration <= 0) return;
    startSlider.max   = duration;
    endSlider.max     = duration;
    startSlider.value = 0;
    endSlider.value   = duration;
    startSlider.removeAttribute('disabled');
    endSlider.removeAttribute('disabled');
    endInput.value         = _fmtTime(duration);
    startLabel.textContent = '0:00';
    endLabel.textContent   = _fmtTime(duration);
    if (hint) hint.textContent = 'Drag handles or type a time';
    _updateDualFill();
    _updateClipDuration();
  }

  var _serverDuration = {{ video_duration | float }};
  _initSlider(_serverDuration);

  window._onYTReady = function (duration) { _initSlider(duration); };

  startSlider.addEventListener('input', function () {
    var sv = parseFloat(startSlider.value);
    var ev = parseFloat(endSlider.value);
    if (sv >= ev - 0.5) startSlider.value = Math.max(0, ev - 0.5);
    startInput.value = _fmtTime(startSlider.value);
    startLabel.textContent = _fmtTime(startSlider.value);
    _updateDualFill();
    _updateClipDuration();
  });

  endSlider.addEventListener('input', function () {
    var sv = parseFloat(startSlider.value);
    var ev = parseFloat(endSlider.value);
    if (ev <= sv + 0.5) endSlider.value = Math.min(parseFloat(endSlider.max), sv + 0.5);
    endInput.value = _fmtTime(endSlider.value);
    endLabel.textContent = _fmtTime(endSlider.value);
    _updateDualFill();
    _updateClipDuration();
  });

  startInput.addEventListener('input', function () {
    var t = _parseTime(startInput.value);
    if (!isNaN(t)) { startSlider.value = t; _updateDualFill(); _updateClipDuration(); }
  });

  endInput.addEventListener('input', function () {
    var t = _parseTime(endInput.value);
    if (!isNaN(t)) { endSlider.value = t; _updateDualFill(); _updateClipDuration(); }
  });

  // ── Format buttons ─────────────────────────────────────────────────────
  var _fmtInput = document.getElementById('output-format-input');

  function _setFormat(fmt) {
    _fmtInput.value = fmt;
    document.querySelectorAll('.fmt-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.fmt === fmt);
    });
    var noAudio = (fmt === 'gif' || fmt === 'webp');
    var subCb = document.getElementById('subtitles-toggle');
    if (subCb) subCb.disabled = noAudio;
    var imgInput = document.getElementById('watermark-image-input');
    var wmOn = document.getElementById('watermark-enabled-cb').checked;
    if (imgInput) imgInput.disabled = !wmOn || fmt === 'gif';
    var wfLabel = document.getElementById('wm-file-label');
    if (wfLabel) wfLabel.style.opacity = (!wmOn || fmt === 'gif') ? '0.35' : '1';
  }

  document.querySelectorAll('.fmt-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { if (!btn.disabled) _setFormat(btn.dataset.fmt); });
  });

  // ── Speed buttons ──────────────────────────────────────────────────────
  document.querySelectorAll('.speed-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.speed-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('speed-input').value = btn.dataset.speed;
    });
  });

  // ── Position buttons ────────────────────────────────────────────────────
  document.querySelectorAll('.pos-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (btn.disabled) return;
      document.querySelectorAll('.pos-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('watermark-pos-input').value = btn.dataset.pos;
    });
  });

  // ── Watermark image filename display ───────────────────────────────────
  var _wmFileInput = document.getElementById('watermark-image-input');
  if (_wmFileInput) {
    _wmFileInput.addEventListener('change', function() {
      var nameEl = document.getElementById('wm-file-name');
      if (nameEl) nameEl.textContent = this.files[0] ? this.files[0].name : 'Choose image…';
    });
  }

  // ── Watermark toggle ────────────────────────────────────────────────────
  document.getElementById('watermark-enabled-cb').addEventListener('change', function() {
    var active = this.checked;
    var panel = document.getElementById('watermark-panel');
    panel.style.display = active ? 'flex' : 'none';
    document.getElementById('watermark-text-input').disabled = !active;
    document.querySelectorAll('.pos-btn').forEach(function(b){ b.disabled = !active; });
    var fmt = _fmtInput.value;
    var imgInput = document.getElementById('watermark-image-input');
    if (imgInput) imgInput.disabled = !active || fmt === 'gif';
    var wfLabel = document.getElementById('wm-file-label');
    if (wfLabel) wfLabel.style.opacity = (!active || fmt === 'gif') ? '0.35' : '1';
  });

  // ── Crop editor ────────────────────────────────────────────────────────
  (function () {
    var VW = {{ video_width or 0 }};
    var VH = {{ video_height or 0 }};

    var PRESETS = {'9:16':{w:9,h:16},'1:1':{w:1,h:1},'4:5':{w:4,h:5},'16:9':{w:16,h:9}};
    var _preset = '9:16', _custom = false;
    var _cx = 0, _cy = 0, _cw = 1, _ch = 1;
    var _drag = null;

    var _wrapper  = document.getElementById('crop-canvas-wrapper');
    var _box      = document.getElementById('crop-box');
    var _maskT    = document.getElementById('cmask-t');
    var _maskB    = document.getElementById('cmask-b');
    var _maskL    = document.getElementById('cmask-l');
    var _maskR    = document.getElementById('cmask-r');
    var _resEl    = document.getElementById('crop-resolution');
    var _inX      = document.getElementById('crop-x-input');
    var _inY      = document.getElementById('crop-y-input');
    var _inW      = document.getElementById('crop-w-input');
    var _inH      = document.getElementById('crop-h-input');

    function _clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function _redraw() {
      var W = _wrapper.offsetWidth, H = _wrapper.offsetHeight;
      if (!W || !H) return;
      var px = _cx * W, py = _cy * H, pw = _cw * W, ph = _ch * H;
      _box.style.left   = px + 'px';
      _box.style.top    = py + 'px';
      _box.style.width  = pw + 'px';
      _box.style.height = ph + 'px';
      _maskT.style.cssText = 'top:0;left:0;right:0;height:' + py + 'px';
      _maskB.style.cssText = 'bottom:0;left:0;right:0;height:' + (H - py - ph) + 'px';
      _maskL.style.cssText = 'top:' + py + 'px;left:0;width:' + px + 'px;height:' + ph + 'px';
      _maskR.style.cssText = 'top:' + py + 'px;right:0;width:' + (W - px - pw) + 'px;height:' + ph + 'px';
      _inX.value = _cx.toFixed(6); _inY.value = _cy.toFixed(6);
      _inW.value = _cw.toFixed(6); _inH.value = _ch.toFixed(6);
      if (VW > 0 && VH > 0) {
        var oW = Math.floor(_cw * VW / 2) * 2;
        var oH = Math.floor(_ch * VH / 2) * 2;
        _resEl.textContent = oW + ' × ' + oH;
      } else {
        _resEl.textContent = Math.round(_cw * 100) + '% × ' + Math.round(_ch * 100) + '%';
      }
    }

    function _applyPreset(p) {
      _preset = p; _custom = (p === 'custom');
      var handles = _box.querySelectorAll('.crop-handle');
      handles.forEach(function(h){ h.style.display = _custom ? 'block' : 'none'; });
      if (!_custom) {
        var r = PRESETS[p];
        var W = _wrapper.offsetWidth, H = _wrapper.offsetHeight;
        if (!W || !H) return;
        var wAR = W / H, pAR = r.w / r.h;
        if (wAR > pAR) { _ch = 1; _cw = pAR / wAR; }
        else            { _cw = 1; _ch = wAR / pAR; }
        _cx = (1 - _cw) / 2; _cy = (1 - _ch) / 2;
      }
      _redraw();
    }

    function _evXY(e) {
      var t = e.touches ? e.touches[0] : e;
      var r = _wrapper.getBoundingClientRect();
      return {x: t.clientX - r.left, y: t.clientY - r.top};
    }

    function _onDown(e) {
      e.preventDefault();
      var p = _evXY(e), W = _wrapper.offsetWidth, H = _wrapper.offsetHeight;
      var handle = e.target.dataset && e.target.dataset.handle;
      var type = (handle && _custom) ? handle : 'move';
      _drag = {type:type, sx:p.x, sy:p.y, cx:_cx, cy:_cy, cw:_cw, ch:_ch, W:W, H:H};
    }

    function _onMove(e) {
      if (!_drag) return;
      e.preventDefault();
      var p = _evXY(e);
      var dx = (p.x - _drag.sx) / _drag.W, dy = (p.y - _drag.sy) / _drag.H;
      var MIN = 20 / _drag.W, MINH = 20 / _drag.H;
      var nx = _drag.cx, ny = _drag.cy, nw = _drag.cw, nh = _drag.ch;
      if (_drag.type === 'move') {
        nx = _clamp(_drag.cx + dx, 0, 1 - nw);
        ny = _clamp(_drag.cy + dy, 0, 1 - nh);
      } else if (_drag.type === 'se') {
        nw = _clamp(_drag.cw + dx, MIN, 1 - nx);
        nh = _clamp(_drag.ch + dy, MINH, 1 - ny);
      } else if (_drag.type === 'sw') {
        nw = _clamp(_drag.cw - dx, MIN, _drag.cx + _drag.cw);
        nx = _drag.cx + _drag.cw - nw;
        nh = _clamp(_drag.ch + dy, MINH, 1 - ny);
      } else if (_drag.type === 'ne') {
        nw = _clamp(_drag.cw + dx, MIN, 1 - nx);
        nh = _clamp(_drag.ch - dy, MINH, _drag.cy + _drag.ch);
        ny = _drag.cy + _drag.ch - nh;
      } else if (_drag.type === 'nw') {
        nw = _clamp(_drag.cw - dx, MIN, _drag.cx + _drag.cw);
        nx = _drag.cx + _drag.cw - nw;
        nh = _clamp(_drag.ch - dy, MINH, _drag.cy + _drag.ch);
        ny = _drag.cy + _drag.ch - nh;
      }
      _cx = nx; _cy = ny; _cw = nw; _ch = nh;
      _redraw();
    }

    function _onUp() { _drag = null; }

    _box.addEventListener('mousedown', _onDown);
    _box.addEventListener('touchstart', _onDown, {passive:false});
    document.addEventListener('mousemove', _onMove);
    document.addEventListener('touchmove', _onMove, {passive:false});
    document.addEventListener('mouseup', _onUp);
    document.addEventListener('touchend', _onUp);
    window.addEventListener('resize', _redraw);

    document.querySelectorAll('.crop-preset-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.crop-preset-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        _applyPreset(btn.dataset.preset);
      });
    });

    document.getElementById('crop-enabled-cb').addEventListener('change', function() {
      var active = this.checked;
      var panel = document.getElementById('crop-panel');
      panel.style.display = active ? 'flex' : 'none';
      _inX.disabled = !active; _inY.disabled = !active;
      _inW.disabled = !active; _inH.disabled = !active;
      ['mkv','mp3','aac'].forEach(function(v) {
        var b = document.querySelector('.fmt-btn[data-fmt="' + v + '"]');
        if (b) {
          b.disabled = active;
          if (active && _fmtInput.value === v) _setFormat('mp4');
        }
      });
      if (active) _applyPreset(_preset);
    });
  })();

  window._validateClip = function () {
    var errWrap = document.getElementById('clip-error');
    var errMsg  = document.getElementById('clip-error-msg');
    var end = endInput.value.trim();
    if (!end) {
      errMsg.textContent = 'Please enter an end time.';
      errWrap.classList.add('visible');
      return false;
    }
    var s = _parseTime(startInput.value);
    var e = _parseTime(end);
    if (s >= e) {
      errMsg.textContent = 'Start time must be before end time.';
      errWrap.classList.add('visible');
      return false;
    }
    errWrap.classList.remove('visible');
    return true;
  };
})();
</script>
